    <style>
      :root {
        --bg: #fff;
        --text: #000;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #000;
          --text: #fff;
        }
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--text);
        overflow-x: clip;
      }

      body {
        min-height: 100svh;
        display: flex;
        flex-direction: column;
        font-family: system-ui, sans-serif;
      }

      /* Header: desktop = 3-column; ≤1052px = stacked, TOC hidden */
      .site-header {
        position: fixed;
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: start;
        column-gap: 1rem;
        padding: 1rem 1.25rem 0;
        width: 100%;
      }

      .brand {
        justify-self: start;
      }

      .toc-slot {
        justify-self: center;
      }

      .partner {
        justify-self: end;
      }

      .site-header svg {
        display: block;
        height: auto;
        max-width: 100%;
      }

      .main-links {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12vh;
        padding: 2rem 1rem;
        width: 100%;
      }

      .main-links a {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-decoration: none;
        max-width: 100%;
      }

      .main-links svg {
        display: block;
        height: auto;
        flex-shrink: 0;
      }

      a:hover svg path {
        fill: #00f;
      }

      @media (max-width: 1052px) {
        .site-header {
          grid-template-columns: 1fr;
          justify-items: center;
          row-gap: 0.5rem;
          padding-inline: max(1rem, env(safe-area-inset-left))
            max(1rem, env(safe-area-inset-right));
          transform: scale(0.7);
        }

        .brand,
        .partner {
          justify-self: center;
        }

        /* Hide TABLE OF CONTENTS (≤1052px) */
        .toc-slot {
          display: none;
        }

        .link-watch,
        .link-slides,
        .link-titles {
          transform: scale(calc(100vw / 100vh));
        }
      }
    </style>
